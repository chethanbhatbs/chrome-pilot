<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabPilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            heading: ['JetBrains Mono', 'monospace'],
            body: ['Manrope', 'sans-serif'],
          },
          colors: {
            tp: { bg: '#1a1a2e', surface: '#16213e', accent: '#0f3460', highlight: '#4cc9f0', pinned: '#e2b714', audible: '#4ade80', duplicate: '#f59e0b', destructive: '#ff4d4d' },
          }
        }
      }
    }
  </script>
</head>
<body class="dark bg-tp-bg text-gray-200 font-body h-screen flex flex-col overflow-hidden">
  <div id="app" class="flex flex-col h-full">
    <!-- Search Bar -->
    <div class="px-2 pt-2 pb-1 space-y-1 bg-tp-bg/80 backdrop-blur-md border-b border-white/[0.08]">
      <div class="flex items-center gap-1.5">
        <div class="relative flex-1">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-500 w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="searchInput" type="text" placeholder="Search tabs..." class="w-full h-8 pl-8 pr-4 text-xs bg-tp-surface border-none rounded-md ring-1 ring-white/10 focus:ring-tp-highlight focus:outline-none placeholder:text-gray-500 font-body">
        </div>
        <button id="settingsBtn" class="p-1.5 rounded-md text-gray-500 hover:text-gray-200 hover:bg-white/10 transition-all">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
      </div>
      <!-- Quick Actions -->
      <div id="quickActions" class="flex items-center gap-1 py-1 border-b border-white/[0.08]"></div>
    </div>

    <!-- Tab Tree -->
    <div id="tabTree" class="flex-1 overflow-y-auto"></div>

    <!-- Stats Bar -->
    <div id="statsBar" class="flex items-center justify-between px-3 py-1.5 border-t border-white/[0.08] bg-tp-surface/80 backdrop-blur-sm text-[10px] font-mono"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
